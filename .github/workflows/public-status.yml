name: Public status

on:
  push:
    paths: ["status/**", "profile/**", "scripts/validate-public-status.py", ".github/workflows/public-status.yml"]
  pull_request:
    paths: ["status/**", "profile/**", "scripts/validate-public-status.py", ".github/workflows/public-status.yml"]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/validate-public-status.py --online
