name: Protocol or feature proposal
description: Propose a bounded, traceable change
title: "[Proposal]: "
labels: ["proposal"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and scope
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Schema, compatibility and migration impact
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Tests, counterexamples and evidence

